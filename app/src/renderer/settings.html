<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>OwenFlow</title>
    <style>
      :root {
        --bg: #101014;
        --panel: #17171d;
        --panel-2: #1d1d25;
        --border: rgba(255, 255, 255, 0.08);
        --text: #ececf1;
        --text-dim: #9a9aa6;
        --accent: #6ea8ff;
        --green: #32d74b;
        --red: #ff453a;
        --radius: 10px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          'Segoe UI Variable Text',
          'Segoe UI',
          system-ui,
          sans-serif;
        font-size: 14px;
        height: 100%;
        -webkit-font-smoothing: antialiased;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 24px 0;
      }
      header h1 {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.01em;
        margin-right: 8px;
      }
      header h1 span {
        color: var(--accent);
      }
      .tabs {
        display: flex;
        gap: 4px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px;
      }
      .tab {
        border: none;
        background: transparent;
        color: var(--text-dim);
        font: inherit;
        font-weight: 600;
        padding: 6px 18px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 120ms ease;
      }
      .tab.active {
        background: var(--panel-2);
        color: var(--text);
        box-shadow: inset 0 0 0 1px var(--border);
      }

      main {
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px 28px;
      }
      .page {
        display: none;
        max-width: 640px;
        margin: 0 auto;
      }
      .page.active {
        display: block;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 20px;
        margin-bottom: 16px;
      }
      .card h2 {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-dim);
        margin-bottom: 14px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 8px 0;
      }
      .row + .row {
        border-top: 1px solid var(--border);
      }
      .row label.title {
        font-weight: 600;
      }
      .hint {
        display: block;
        color: var(--text-dim);
        font-size: 12px;
        margin-top: 2px;
        font-weight: 400;
      }
      input[type='text'],
      input[type='password'],
      select,
      textarea {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
        padding: 7px 10px;
        font: inherit;
        font-size: 13px;
        min-width: 200px;
        outline: none;
        transition: border-color 120ms ease;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--accent);
      }
      textarea {
        width: 100%;
        min-height: 110px;
        resize: vertical;
        font-family: 'Cascadia Code', Consolas, monospace;
        font-size: 12.5px;
        line-height: 1.5;
      }
      input[type='checkbox'] {
        width: 18px;
        height: 18px;
        accent-color: var(--accent);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 4px;
      }
      button.primary,
      button.ghost,
      button.danger {
        font: inherit;
        font-weight: 600;
        border-radius: 8px;
        padding: 8px 18px;
        cursor: pointer;
        border: 1px solid var(--border);
        transition: all 120ms ease;
      }
      button.primary {
        background: var(--accent);
        border-color: transparent;
        color: #0b1220;
      }
      button.primary:hover {
        filter: brightness(1.1);
      }
      button.ghost {
        background: var(--panel-2);
        color: var(--text);
      }
      button.ghost:hover {
        border-color: var(--accent);
      }
      button.danger {
        background: transparent;
        color: var(--red);
        border-color: rgba(255, 69, 58, 0.35);
      }
      button.danger:hover {
        background: rgba(255, 69, 58, 0.1);
      }
      #save-status {
        color: var(--green);
        font-size: 13px;
        opacity: 0;
        transition: opacity 200ms ease;
      }
      #save-status.show {
        opacity: 1;
      }

      /* history */
      #history-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      #history-count {
        color: var(--text-dim);
        font-size: 13px;
      }
      .entry {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 16px;
        margin-bottom: 10px;
        display: flex;
        gap: 14px;
        align-items: flex-start;
      }
      .entry .body {
        flex: 1;
        min-width: 0;
      }
      .entry .ts {
        color: var(--text-dim);
        font-size: 11.5px;
        margin-bottom: 4px;
      }
      .entry .text {
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.45;
      }
      .entry button.copy {
        flex: 0 0 auto;
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text-dim);
        border-radius: 7px;
        padding: 5px 12px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      .entry button.copy:hover {
        color: var(--text);
        border-color: var(--accent);
      }
      .empty {
        color: var(--text-dim);
        text-align: center;
        padding: 48px 0;
      }
      .cleanup-fields {
        display: none;
      }
      .cleanup-fields.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Owen<span>Flow</span></h1>
        <div class="tabs">
          <button class="tab active" data-tab="settings">Settings</button>
          <button class="tab" data-tab="history">History</button>
        </div>
      </header>

      <main>
        <!-- ─── Settings tab ─── -->
        <section class="page active" id="page-settings">
          <div class="card">
            <h2>Dictation</h2>
            <div class="row">
              <label class="title" for="f-hotkey">
                Push-to-talk hotkey
                <span class="hint">uiohook keycode name, e.g. RightCtrl, F13</span>
              </label>
              <input type="text" id="f-hotkey" spellcheck="false" />
            </div>
            <div class="row">
              <label class="title" for="f-mode">
                Mode
                <span class="hint">Hold to talk, or press once to start / again to stop</span>
              </label>
              <select id="f-mode">
                <option value="hold">Hold</option>
                <option value="toggle">Toggle</option>
              </select>
            </div>
            <div class="row">
              <label class="title" for="f-model">
                Whisper model
                <span class="hint">Bigger = more accurate, slower</span>
              </label>
              <select id="f-model">
                <option value="tiny">tiny</option>
                <option value="base">base</option>
                <option value="small">small</option>
                <option value="medium">medium</option>
                <option value="large-v3">large-v3</option>
              </select>
            </div>
            <div class="row">
              <label class="title" for="f-language">
                Language
                <span class="hint">ISO code like "en"; empty = auto-detect</span>
              </label>
              <input type="text" id="f-language" placeholder="auto" spellcheck="false" />
            </div>
          </div>

          <div class="card">
            <h2>AI cleanup</h2>
            <div class="row">
              <label class="title" for="f-cleanup">
                Enable cleanup pass
                <span class="hint">MiniMax removes fillers and fixes punctuation; raw fallback on error</span>
              </label>
              <input type="checkbox" id="f-cleanup" />
            </div>
            <div class="cleanup-fields" id="cleanup-fields">
              <div class="row">
                <label class="title" for="f-minimax-key">MiniMax API key</label>
                <input type="password" id="f-minimax-key" spellcheck="false" />
              </div>
              <div class="row">
                <label class="title" for="f-minimax-group">MiniMax group ID</label>
                <input type="text" id="f-minimax-group" spellcheck="false" />
              </div>
            </div>
          </div>

          <div class="card">
            <h2>Dictionary</h2>
            <label class="hint" for="f-dictionary" style="margin-bottom: 8px">
              One entry per line. Plain words bias recognition (e.g. <b>Hermes</b>); use
              <b>wrong=&gt;right</b> for replacements (e.g. <b>owen flow=&gt;OwenFlow</b>).
            </label>
            <textarea id="f-dictionary" spellcheck="false" placeholder="Hermes&#10;Qdrant&#10;owen flow=>OwenFlow"></textarea>
          </div>

          <div class="card">
            <h2>System</h2>
            <div class="row">
              <label class="title" for="f-startup">Launch on startup</label>
              <input type="checkbox" id="f-startup" />
            </div>
          </div>

          <div class="actions">
            <button class="primary" id="btn-save">Save settings</button>
            <button class="ghost" id="btn-test" title="Runs the stub pipeline so you can see the pill">
              Test dictation (stub)
            </button>
            <span id="save-status">Saved ✓</span>
          </div>
        </section>

        <!-- ─── History tab ─── -->
        <section class="page" id="page-history">
          <div id="history-toolbar">
            <span id="history-count"></span>
            <button class="danger" id="btn-clear">Clear all</button>
          </div>
          <div id="history-list"></div>
        </section>
      </main>
    </div>
    <script type="module" src="./src/settings.ts"></script>
  </body>
</html>
