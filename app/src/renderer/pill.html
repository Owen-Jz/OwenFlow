<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>OwenFlow Pill</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
        width: 100%;
        height: 100%;
        font-family:
          'JetBrains Mono',
          'Cascadia Code',
          'Cascadia Mono',
          Consolas,
          'Courier New',
          monospace;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      #stage {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #pill {
        position: relative;
        display: flex;
        align-items: center;
        gap: 7px;
        height: 40px;
        width: 200px;
        padding: 0 12px;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(22, 22, 30, 0.95), rgba(11, 11, 17, 0.97));
        border: 1px solid rgba(139, 92, 246, 0.32);
        box-shadow:
          0 6px 20px rgba(0, 0, 0, 0.55),
          0 0 14px rgba(139, 92, 246, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          inset 0 0 10px rgba(139, 92, 246, 0.05);
        backdrop-filter: blur(12px);
        opacity: 0;
        transform: translateY(8px) scale(0.94);
        transition:
          opacity 160ms ease,
          transform 200ms cubic-bezier(0.2, 0.9, 0.3, 1.15),
          border-color 220ms ease,
          box-shadow 220ms ease;
        pointer-events: none;
        overflow: hidden;
      }
      /* faint scanline texture */
      #pill::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: repeating-linear-gradient(
          180deg,
          rgba(139, 92, 246, 0.05) 0px,
          rgba(139, 92, 246, 0.05) 1px,
          transparent 1px,
          transparent 3px
        );
        pointer-events: none;
      }
      /* faint top edge glow line */
      #pill::after {
        content: '';
        position: absolute;
        top: 0;
        left: 14%;
        right: 14%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(139, 92, 246, 0.55),
          rgba(59, 130, 246, 0.45),
          transparent
        );
        pointer-events: none;
      }
      #pill.visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      /* live waveform canvas (recording + transcribing) */
      #wave {
        display: none;
        flex: 1 1 auto;
        height: 24px;
        min-width: 0;
      }
      #pill[data-state='recording'] #wave,
      #pill[data-state='transcribing'] #wave {
        display: block;
      }
      .icon {
        flex: 0 0 auto;
        display: none;
        position: relative;
      }
      /* recording: tiny red rec dot + 8px mono REC glyph */
      #rec {
        align-items: center;
        gap: 4px;
      }
      #pill[data-state='recording'] #rec {
        display: flex;
      }
      #rec .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #ff453a;
        box-shadow: 0 0 5px rgba(255, 69, 58, 0.85);
        animation: blink 1.3s ease-in-out infinite;
      }
      #rec .glyph {
        font-size: 8px;
        font-weight: 600;
        letter-spacing: 0.14em;
        color: rgba(255, 99, 88, 0.85);
        line-height: 1;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      /* transcribing: tiny morphing mono dots */
      #proc {
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.18em;
        color: rgba(167, 139, 250, 0.9);
        line-height: 1;
        width: 14px;
        overflow: hidden;
        white-space: nowrap;
        animation: dots 900ms steps(3, end) infinite;
      }
      #pill[data-state='transcribing'] #proc {
        display: block;
      }
      @keyframes dots {
        0% {
          width: 4px;
        }
        100% {
          width: 14px;
        }
      }
      /* done: green check pop */
      #check {
        color: #32d74b;
        margin: 0 auto;
      }
      #check svg {
        width: 14px;
        height: 14px;
        display: block;
        filter: drop-shadow(0 0 4px rgba(50, 215, 75, 0.6));
        animation: pop 240ms cubic-bezier(0.2, 1.4, 0.4, 1);
      }
      @keyframes pop {
        0% {
          transform: scale(0.4);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      /* error: red bang */
      #bang {
        color: #ff453a;
        font-weight: 700;
        font-size: 11px;
        line-height: 12px;
        text-align: center;
      }
      /* micro-typography label: error messages only */
      #label {
        display: none;
        color: rgba(240, 240, 245, 0.88);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.04em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #pill[data-state='done'] #check,
      #pill[data-state='error'] #bang {
        display: block;
      }
      #pill[data-state='error'] #label {
        display: block;
      }
      #pill[data-state='done'] {
        border-color: rgba(50, 215, 75, 0.5);
        box-shadow:
          0 6px 20px rgba(0, 0, 0, 0.55),
          0 0 16px rgba(50, 215, 75, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      #pill[data-state='error'] {
        border-color: rgba(255, 69, 58, 0.45);
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="pill" data-state="idle">
        <div class="icon" id="rec">
          <span class="dot"></span>
          <span class="glyph">REC</span>
        </div>
        <div class="icon" id="proc">···</div>
        <canvas id="wave"></canvas>
        <div class="icon" id="check">
          <svg viewBox="0 0 16 16" fill="none">
            <path
              d="M2.5 8.5L6 12L13.5 4.5"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div class="icon" id="bang">!</div>
        <div id="label"></div>
      </div>
    </div>
    <script type="module" src="./src/pill.ts"></script>
  </body>
</html>
