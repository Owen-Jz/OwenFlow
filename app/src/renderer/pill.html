<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:8484; media-src blob:"
    />
    <title>OwenFlow Pill</title>
    <style>
      /* ── Wispr-Flow-style palette — quiet, monochrome, Apple-esque ─────────
         Dark charcoal shell + white bars. No brand reds, no neon, no glow.
         Single source of truth for recoloring (mirrored in pill.ts PALETTE). */
      :root {
        --shell: rgba(28, 28, 30, 0.96); /* near-black charcoal */
        --edge: rgba(255, 255, 255, 0.08); /* hairline light border */
        --ink: rgba(235, 235, 240, 0.9); /* primary text (error msg) */
        --dim: rgba(235, 235, 240, 0.45); /* secondary text (timer) */
        --ok: rgba(140, 225, 165, 0.95); /* soft green check — low-key */
        --warn: #ffb340; /* amber "!" for errors */
        --rec: #ff453a; /* meeting recording dot — the one allowed red */
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
        width: 100%;
        height: 100%;
        /* system UI stack — matches the quiet native look; no techy mono */
        font-family:
          -apple-system,
          'Segoe UI Variable Text',
          'Segoe UI',
          system-ui,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      #stage {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* ── The pill shell ────────────────────────────────────────────────────
         44px tall, fully rounded (radius = height/2). Width is state-driven:
         compact at rest / done / error, wider while the waveform is live.
         The window is larger than the pill, so a plain CSS width transition
         animates cleanly without any window resizing. */
      #pill {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 44px;
        width: 120px;
        padding: 0 16px;
        border-radius: 22px;
        background: var(--shell);
        border: 1px solid var(--edge);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(12px);
        opacity: 0;
        transform: translateY(8px) scale(0.96);
        transition:
          opacity 150ms ease-in,
          transform 180ms cubic-bezier(0.4, 0, 0.8, 0.4),
          width 260ms cubic-bezier(0.3, 0.9, 0.3, 1);
        pointer-events: none;
        overflow: hidden;
      }
      /* recording is the only wide state — room for the waveform + timer */
      #pill[data-state='recording'] {
        width: 180px;
      }
      /* errors carry a short message; a touch wider than compact so it reads */
      #pill[data-state='error'] {
        width: 150px;
      }
      /* mode-switch notice reuses the error state's compact-with-label width —
         same layout treatment, but neutral styling (no amber "!", no glitch) */
      #pill[data-state='notice'] {
        width: 150px;
      }
      /* gentle entrance: small rise + fade, barely-there overshoot (Wispr is
         calm — the old cockpit spring bounced too hard) */
      #pill.visible {
        opacity: 1;
        transform: none;
        animation: pill-in 320ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes pill-in {
        0% {
          opacity: 0;
          transform: translateY(10px) scale(0.96);
        }
        70% {
          opacity: 1;
          transform: translateY(-1px) scale(1.004);
        }
        100% {
          opacity: 1;
          transform: none;
        }
      }
      /* live waveform canvas — recording only (processing uses the dots) */
      #wave {
        display: none;
        flex: 1 1 auto;
        height: 24px;
        min-width: 0;
      }
      #pill[data-state='recording'] #wave {
        display: block;
      }
      .icon {
        flex: 0 0 auto;
        display: none;
        position: relative;
      }
      /* recording: tiny dim elapsed counter, right side — useful, not loud */
      #time {
        display: none;
        flex: 0 0 auto;
        font-size: 9px;
        font-weight: 500;
        line-height: 1;
        color: var(--dim);
        font-variant-numeric: tabular-nums;
      }
      #pill[data-state='recording'] #time {
        display: block;
      }
      /* meeting: persistent calm state — small red dot + elapsed timer in the
         compact shell. No waveform, no width change: this sits on screen for
         hours, so it must be the quietest thing the pill can show. */
      #dot {
        display: none;
        flex: 0 0 auto;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--rec);
        animation: dot-breathe 2.6s ease-in-out infinite;
      }
      #pill[data-state='meeting'] #dot {
        display: block;
      }
      #pill[data-state='meeting'] #time {
        display: block;
      }
      /* slow opacity breathe — alive, not blinking */
      @keyframes dot-breathe {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }
      /* transcribing: three soft white dots pulsing in sequence — the calm
         indeterminate cue that replaces the waveform while we wait */
      #proc {
        align-items: center;
        gap: 5px;
      }
      #pill[data-state='transcribing'] #proc {
        display: flex;
      }
      #proc span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        animation: proc-pulse 1.05s ease-in-out infinite;
      }
      #proc span:nth-child(2) {
        animation-delay: 0.175s;
      }
      #proc span:nth-child(3) {
        animation-delay: 0.35s;
      }
      @keyframes proc-pulse {
        0%,
        60%,
        100% {
          opacity: 0.25;
          transform: scale(0.85);
        }
        30% {
          opacity: 1;
          transform: scale(1);
        }
      }
      /* done: small soft check, quick fade-in — no pop, no glow */
      #check {
        color: var(--ok);
        margin: 0 auto;
      }
      #check svg {
        width: 13px;
        height: 13px;
        display: block;
        animation: check-in 200ms ease-out;
      }
      @keyframes check-in {
        0% {
          transform: scale(0.75);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      /* error: small amber "!" — quiet warning, no glitch/jitter */
      #bang {
        color: var(--warn);
        font-weight: 700;
        font-size: 12px;
        line-height: 13px;
        text-align: center;
      }
      /* short error message next to the "!" */
      #label {
        display: none;
        color: var(--ink);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #pill[data-state='done'] #check,
      #pill[data-state='error'] #bang {
        display: block;
      }
      /* notice: label only — plain white text centered in the shell, no icon,
         no waveform/canvas (those are gated on their own data-states above) */
      #pill[data-state='error'] #label,
      #pill[data-state='notice'] #label {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="pill" data-state="idle">
        <div class="icon" id="proc">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <canvas id="wave"></canvas>
        <div id="dot"></div>
        <div id="time">0:00</div>
        <div class="icon" id="check">
          <svg viewBox="0 0 16 16" fill="none">
            <path
              d="M2.5 8.5L6 12L13.5 4.5"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div class="icon" id="bang">!</div>
        <div id="label"></div>
      </div>
    </div>
    <script type="module" src="./src/pill.ts"></script>
  </body>
</html>
