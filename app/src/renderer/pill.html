<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>OwenFlow Pill</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
        width: 100%;
        height: 100%;
        font-family:
          'JetBrains Mono',
          'Cascadia Code',
          'Cascadia Mono',
          Consolas,
          'Courier New',
          monospace;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      #stage {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #pill {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 52px;
        width: 240px;
        padding: 0 16px;
        border-radius: 26px;
        background: linear-gradient(180deg, rgba(26, 26, 34, 0.94), rgba(13, 13, 20, 0.96));
        border: 1px solid rgba(139, 92, 246, 0.22);
        box-shadow:
          0 8px 28px rgba(0, 0, 0, 0.5),
          0 0 18px rgba(139, 92, 246, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(14px);
        opacity: 0;
        transform: translateY(10px) scale(0.92);
        transition:
          opacity 180ms ease,
          transform 220ms cubic-bezier(0.2, 0.9, 0.3, 1.2),
          border-color 240ms ease,
          box-shadow 240ms ease;
        pointer-events: none;
      }
      #pill.visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      /* live waveform canvas (recording + transcribing) */
      #wave {
        display: none;
        flex: 1 1 auto;
        height: 32px;
        min-width: 0;
      }
      #pill[data-state='recording'] #wave,
      #pill[data-state='transcribing'] #wave {
        display: block;
      }
      .icon {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        display: none;
        position: relative;
      }
      /* recording: tiny red rec dot */
      #dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #ff453a;
        box-shadow: 0 0 6px rgba(255, 69, 58, 0.8);
        animation: blink 1.3s ease-in-out infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      /* done: green check pop */
      #check {
        color: #32d74b;
        margin: 0 auto;
      }
      #check svg {
        width: 16px;
        height: 16px;
        display: block;
        filter: drop-shadow(0 0 5px rgba(50, 215, 75, 0.6));
        animation: pop 260ms cubic-bezier(0.2, 1.4, 0.4, 1);
      }
      @keyframes pop {
        0% {
          transform: scale(0.4);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      /* error: red bang */
      #bang {
        color: #ff453a;
        font-weight: 700;
        font-size: 12px;
        line-height: 14px;
        text-align: center;
      }
      /* micro-typography label: error messages only */
      #label {
        display: none;
        color: rgba(240, 240, 245, 0.88);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.04em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #pill[data-state='recording'] #dot,
      #pill[data-state='done'] #check,
      #pill[data-state='error'] #bang {
        display: block;
      }
      #pill[data-state='error'] #label {
        display: block;
      }
      #pill[data-state='done'] {
        border-color: rgba(50, 215, 75, 0.45);
        box-shadow:
          0 8px 28px rgba(0, 0, 0, 0.5),
          0 0 20px rgba(50, 215, 75, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      #pill[data-state='error'] {
        border-color: rgba(255, 69, 58, 0.4);
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="pill" data-state="idle">
        <div class="icon" id="dot"></div>
        <canvas id="wave"></canvas>
        <div class="icon" id="check">
          <svg viewBox="0 0 16 16" fill="none">
            <path
              d="M2.5 8.5L6 12L13.5 4.5"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div class="icon" id="bang">!</div>
        <div id="label"></div>
      </div>
    </div>
    <script type="module" src="./src/pill.ts"></script>
  </body>
</html>
